name: Build and Deploy to MonsterASP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: dotnet publish PlayStation.API/PlayStation.API.csproj -c Release -o publish --self-contained false

    - name: Deploy to MonsterASP via FTP
      run: |
        sudo apt-get update && sudo apt-get install -y lftp

        # 1. Stop the app by uploading app_offline.htm
        echo '<html><body><h1>Deploying...</h1></body></html>' > app_offline.htm
        lftp -c "
          set ssl:verify-certificate no;
          set net:timeout 30;
          set net:max-retries 3;
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
          put app_offline.htm -o /wwwroot/app_offline.htm;
          bye;
        "
        sleep 5

        # 2. Deploy all files
        lftp -c "
          set ssl:verify-certificate no;
          set net:timeout 30;
          set net:max-retries 3;
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
          mirror -R --verbose --no-perms --ignore-time --parallel=1 --exclude logs/ ./publish /wwwroot;
          bye;
        " || true

        # 3. Remove app_offline.htm to restart the app
        lftp -c "
          set ssl:verify-certificate no;
          set net:timeout 30;
          set net:max-retries 3;
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
          rm /wwwroot/app_offline.htm;
          bye;
        "
