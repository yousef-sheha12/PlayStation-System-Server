name: Build and Deploy to MonsterASP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Publish
      run: dotnet publish PlayStation.API/PlayStation.API.csproj -c Release -o publish --self-contained false

    - name: Deploy to MonsterASP via FTP
      run: |
        sudo apt-get update && sudo apt-get install -y lftp
        lftp -c "
          set ssl:verify-certificate no;
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }};
          mirror -R --delete --verbose ./publish /wwwroot;
          bye;
        "
